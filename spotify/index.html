<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shmotify</title>
    <link rel="icon" href="images/spotify-logo.png" type="image/png">
    <link rel="stylesheet" href="scss/main.css"> 
</head>
<body>
    <header>
        <nav>
            <div class="main-navigation">
                
                <a href="#" class="active" >
                    <img src="images/header/home.png" alt="Home">Home
                </a>
                <a href="#" >
                    <img src="images/header/discover.png" alt="Discover">Discover
                </a>
                <a href="#" >
                    <img src="images/header/search.png" alt="Search">Search
                </a>
            </div>

            <div class="actions">
                <a href="#" >
                    <img src="images/header/notifications.png" alt="Notifications">
                </a>
                <a href="#" >
                    <img src="images/header/privacy.png" alt="Privacy">
                </a>
                <a href="#" >
                    <img src="images/header/friends.png" alt="friends"> 
                </a>
                <a href="#" >
                    <img src="images/header/settings.png" alt="Settings">     
                </a>
                <a href="#" >
                    <img src="images/header/profile.png" alt="Profile"> 
                </a>


            </div>
        </nav>
     
    </header>
    <aside>
           <nav>
            <ul >
                <li><a href="#"><img src="images/aside/my-library.png" alt="Library">My Library</a></li>
                <li><a href="#"><img src="images/aside/pins-icon.png" alt="Pins">Pins</a></li>
                <li><a href="#" class="active"><img src="images/aside/playlists-icon.png" alt="Playlists">Playlists</a></li>
                <li><a href="#"><img src="images/aside/liked-songs-icon.png" alt="Liked Songs">Liked Songs</a></li>
                <li> <a href="#"><img src="images/aside/saves-icon.png" alt="Saves"> Saves</a></li>
                <li><a href="#"><img src="images/aside/albums-icon.png" alt="Albums"> Albums</a></li>
                <li><a href="#"><img src="images/aside/folders-icon.png" alt="Folders"> Folders</a></li>
                <li><a href="#"><img src="images/aside/podcasts-icon.png" alt="Podcasts"> Podcasts</a></li>
                <li><a href="#"><img src="images/aside/audiobooks-icon.png" alt="Audiobooks"> Audiobooks</a></li>
                <li><a href="#"><img src="images/aside/artists-icon.png" alt="Artists"> Artists</a></li>

            </ul>
        </nav>
        
    </aside>

    <main>
     

    </main>

  <footer class="player">
  <!-- Left Zone -->
  <div class="player-left">
    <img src="images/player/cover.png" alt="Album Cover" class="track-cover">
    <div class="track-info">
      <span class="track-title">Track Title</span>
      <span class="track-artist">Artist Name</span>
    </div>
    <!-- Optional action icons -->
    <div class="track-actions">
      <img src="images/player/heart-icon.png" alt="Like">
      <img src="images/player/save-icon.png" alt="Save">
    </div>
  </div>

  <!-- Center Zone: Playback Controls -->
  <div class="player-center">
    <div class="controls">
      <img src="images/player/prev.png" alt="Previous">
      <img src="images/player/play-pause.png" alt="Play/Pause">
      <img src="images/player/next.png" alt="Next">
    </div>
    <div class="progress-bar">
      <span class="time-left">0:00</span>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <span class="time-right">3:45</span>
    </div>
  </div>

  <!-- Right Zone: Volume / Actions -->
  <div class="player-right">
    <div class="actions">
      <img src="images/player/queue.png" alt="Queue">
      <img src="images/player/device.png" alt="Device">
    </div>
    <div class="volume">
      <img src="images/player/volume-icon.png" alt="Volume">
      <div class="volume-bar">
        <div class="volume-fill"></div>
      </div>
    </div>
  </div>
</footer>


</body>
</html>
